services:
  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  gateway-api:
    build: .
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SEEDANCE_API_KEYS: ${SEEDANCE_API_KEYS}
      SEEDANCE_BASE_URL: ${SEEDANCE_BASE_URL}
      REDIS_URL: redis://redis:6379/0
      GATEWAY_ACCESS_TOKEN: ${GATEWAY_ACCESS_TOKEN}
      GATEWAY_PUBLIC_URL: ${GATEWAY_PUBLIC_URL}
      TASK_STATUS_URL_TTL: ${TASK_STATUS_URL_TTL:-120}
      TASK_POLL_INTERVAL: ${TASK_POLL_INTERVAL:-5}
      TASK_TIMEOUT: ${TASK_TIMEOUT:-300}
      TASK_EXECUTION_MODE: queue
    ports:
      - "8001:8001"

  gateway-worker:
    build: .
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    command: ["python", "worker.py"]
    environment:
      SEEDANCE_API_KEYS: ${SEEDANCE_API_KEYS}
      SEEDANCE_BASE_URL: ${SEEDANCE_BASE_URL}
      REDIS_URL: redis://redis:6379/0
      TASK_POLL_INTERVAL: ${TASK_POLL_INTERVAL:-5}
      TASK_TIMEOUT: ${TASK_TIMEOUT:-300}
      TASK_QUEUE_POP_TIMEOUT: ${TASK_QUEUE_POP_TIMEOUT:-5}
      TASK_EXECUTION_MODE: queue
      MAX_CONCURRENT_TASKS: ${MAX_CONCURRENT_TASKS:-20}

volumes:
  redis_data:
