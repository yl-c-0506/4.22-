name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: seedance-gateway
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SEEDANCE_API_KEYS: sk-test
      SEEDANCE_BASE_URL: https://api.ppio.com
      GATEWAY_ACCESS_TOKEN: test-token
      GATEWAY_PUBLIC_URL: http://127.0.0.1:8001
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: seedance-gateway/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: seedance-gateway
          push: false
          load: true
          tags: seedance-gateway:ci

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: seedance-gateway/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r seedance-gateway/requirements.txt
          pip install mypy

      - name: Run mypy
        run: mypy seedance-gateway
        continue-on-error: true
